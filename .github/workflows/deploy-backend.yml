name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    # 移除路径过滤，确保所有提交都触发部署
    # 如果需要优化，可以添加路径过滤
    # paths:
    #   - 'backend-api/**'
    #   - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-api/package-lock.json

      - name: Install dependencies
        run: |
          cd backend-api
          npm ci

      - name: Build backend
        run: |
          cd backend-api
          npm run build

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e  # 遇到错误立即退出
            
            echo "🚀 开始部署后端..."
            
            # 检查目录是否存在
            if [ ! -d "/opt/ue-assets-backend/backend-api" ]; then
              echo "❌ 错误：目录 /opt/ue-assets-backend/backend-api 不存在"
              exit 1
            fi
            
            cd /opt/ue-assets-backend/backend-api
            
            # 如果使用 Git，拉取最新代码
            if [ -d .git ]; then
              echo "📥 拉取最新代码..."
              git pull origin main || {
                echo "⚠️ Git pull 失败，继续使用现有代码"
              }
            fi
            
            # 安装依赖
            echo "📦 安装依赖..."
            npm install --production || {
              echo "❌ npm install 失败"
              exit 1
            }
            
            # 如果服务器上有源码，需要构建
            if [ -d src ]; then
              echo "🔨 构建项目..."
              npm run build || {
                echo "❌ npm run build 失败"
                exit 1
              }
            fi
            
            # 重启 PM2 进程
            echo "🔄 重启 PM2 进程..."
            pm2 restart ue-assets-backend --update-env || {
              echo "❌ PM2 restart 失败，尝试启动..."
              pm2 start ecosystem.config.js || {
                echo "❌ PM2 start 失败"
                exit 1
              }
            }
            
            # 等待服务启动
            sleep 3
            
            # 检查服务状态
            echo "📊 检查服务状态..."
            pm2 status
            
            # 显示日志
            echo "📋 最近日志："
            pm2 logs ue-assets-backend --lines 20 --nostream || true
            
            echo "✅ 部署完成！"

